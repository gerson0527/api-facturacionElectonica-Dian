name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: 22.18.0

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: api_facturacion_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npm run migration:run
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: api_facturacion_test
          NODE_ENV: test

      - name: Unit tests
        run: npm test -- --runInBand --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: "./reports/junit"
          JEST_JUNIT_OUTPUT_NAME: "unit-test-results.xml"

      - name: E2E tests
        run: npm run test:e2e -- --runInBand --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: "./reports/junit"
          JEST_JUNIT_OUTPUT_NAME: "e2e-test-results.xml"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: api_facturacion_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test
          JWT_ACCESS_SECRET: test-access-secret-key-for-ci-64-chars!!
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-64-chars!!
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          ENCRYPTION_KEY_VERSION: 1
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          DIAN_ENVIRONMENT: habilitacion
          DIAN_HABILITACION_URL: https://vpfe-hab.dian.gov.co/WcfDianCustomerServices.svc
          DIAN_PRODUCCION_URL: https://vpfe.dian.gov.co/WcfDianCustomerServices.svc
          DIAN_TIMEOUT_CONNECTION: 5000
          DIAN_TIMEOUT_READ: 10000
          DIAN_TIMEOUT_TOTAL: 15000
          THROTTLER_TTL: 60
          THROTTLER_LIMIT: 100
          THROTTLER_LIMIT_LOGIN: 100
          STORAGE_PATH: ./storage
          XSD_PATH: ./xsd
          LOG_LEVEL: error

      - name: Integration tests
        run: npm run test:integration -- --runInBand --ci --reporters=default --reporters=jest-junit
        continue-on-error: true
        env:
          JEST_JUNIT_OUTPUT_DIR: "./reports/junit"
          JEST_JUNIT_OUTPUT_NAME: "integration-test-results.xml"

      - name: Security tests
        run: npm run test:security -- --runInBand --ci --reporters=default --reporters=jest-junit
        continue-on-error: true
        env:
          JEST_JUNIT_OUTPUT_DIR: "./reports/junit"
          JEST_JUNIT_OUTPUT_NAME: "security-test-results.xml"

      - name: Concurrency tests
        run: npm run test:concurrency -- --runInBand --ci --reporters=default --reporters=jest-junit
        continue-on-error: true
        env:
          JEST_JUNIT_OUTPUT_DIR: "./reports/junit"
          JEST_JUNIT_OUTPUT_NAME: "concurrency-test-results.xml"

      - name: Signature tests
        run: npm run test:signature -- --runInBand --ci --reporters=default --reporters=jest-junit
        continue-on-error: true
        env:
          JEST_JUNIT_OUTPUT_DIR: "./reports/junit"
          JEST_JUNIT_OUTPUT_NAME: "signature-test-results.xml"

      - name: npm audit
        run: npm audit --omit=dev || true

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.json

      - name: Docker build
        run: docker build -t facturacion-api:latest .

      - name: Docker image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'facturacion-api:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Artifacts (Coverage, SBOM, JUnit)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-artifacts
          path: |
            coverage/
            sbom.json
            reports/junit/
